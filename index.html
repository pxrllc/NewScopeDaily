<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsScope Daily</title>
    <link rel="icon" href="./favicon.png?v=2" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- App CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Feeds -->
    <link rel="alternate" type="application/rss+xml" title="NewsScope Daily RSS" href="./feed.xml" />
    <link rel="alternate" type="application/atom+xml" title="NewsScope Daily Atom" href="./atom.xml" />
    <link rel="alternate" type="application/json" title="NewsScope Daily JSON Feed" href="./feed.json" />
</head>

<body class="dark-theme">

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <h1>NewsScope Daily</h1>
                    <span class="subtitle">世界を日々俯瞰するニュースダイジェスト</span>
                </div>
                <div class="header-controls">
                    <div class="date-nav">
                        <button id="nav-prev" class="nav-btn" aria-label="Previous">&lt;</button>
                        <span id="current-date" class="date-display">--.--.--</span>
                        <button id="nav-next" class="nav-btn" aria-label="Next">&gt;</button>

                        <div class="archive-control">
                            <button id="archive-btn" class="nav-btn archive-trigger" onclick="toggleArchive()">
                                📅
                            </button>
                            <div id="archive-dropdown" class="archive-dropdown hidden">
                                <!-- Links injected here -->
                            </div>
                        </div>
                    </div>

                    <div class="share-controls">
                        <button class="share-btn" onclick="sharePage('x')" aria-label="Share on X">𝕏</button>
                        <button class="share-btn" onclick="sharePage('copy')" aria-label="Copy Link">📋</button>
                    </div>
                    <div class="feed-control">
                        <button id="feed-btn" class="nav-btn feed-trigger" onclick="toggleFeedDropdown()" title="フィード購読" aria-label="Feed Subscription">📡</button>
                        <div id="feed-dropdown" class="feed-dropdown hidden">
                            <a href="./feed.xml" target="_blank" class="feed-link-item"><span class="feed-badge rss">RSS</span>RSS 2.0</a>
                            <a href="./atom.xml" target="_blank" class="feed-link-item"><span class="feed-badge atom">Atom</span>Atom 1.0</a>
                            <a href="./feed.json" target="_blank" class="feed-link-item"><span class="feed-badge json">JSON</span>JSON Feed</a>
                        </div>
                    </div>
                    <a href="about.html" class="about-link">About / License</a>
                </div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main class="main-grid">

            <!-- Left Column: Map & Feed -->
            <div class="left-column">
                <!-- Map Section -->
                <div class="map-panel" id="map-section">
                    <div class="panel-header mobile-only collapsed" onclick="toggleSection('map')">
                        <span>🗺️ 地図を表示</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="content-wrapper collapsed" id="map-content">
                        <div id="world-map"></div>
                        <div class="map-overlay">
                            <div class="stat-item">
                                <span class="stat-value" id="total-articles">--</span>
                                <span class="stat-label">記事数</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value" id="total-sources">15</span>
                                <span class="stat-label">ソース</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Resizer Handle -->
                <div class="resizer" id="drag-handle"></div>

                <!-- Feed Section -->
                <section class="content-section" id="bottom-panel">
                    <div class="feed-header">
                        <div class="header-top">
                            <h3>最新ニュース一覧</h3>
                            <div class="mobile-only toggle-btn" onclick="toggleSection('filter')">
                                タグ表示 <span class="toggle-icon" id="filter-icon">▼</span>
                            </div>
                        </div>
                        <div id="filter-container" class="filter-bar content-wrapper">
                            <!-- Filters will be injected here -->
                        </div>
                    </div>
                    <div class="scroll-container">
                        <ul id="feed-list" class="feed-list">
                            <!-- Items loaded here -->
                        </ul>
                    </div>
                </section>
            </div>

            <!-- Right Column: Summary Panel -->
            <div class="summary-panel" id="summary-section">
                <div class="panel-header mobile-only" onclick="toggleSection('summary')">
                    <span>📰 サマリー (要約)</span>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="content-wrapper" id="summary-content">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="world" onclick="switchTab('world')">
                            🌍 世界のトップニュース
                        </button>
                        <button class="tab-btn" data-tab="regional" onclick="switchTab('regional')">
                            📍 地域フォーカス
                        </button>
                    </div>
                    <div id="summary-container" class="markdown-body scrollable-summary">
                        <!-- Content will be loaded here via JS -->
                        <div class="loading">Loading digest...</div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- App JS -->
    <script src="js/map-renderer.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
